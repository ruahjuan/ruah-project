<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo dorado oscuro -->
  <rect width="512" height="512" rx="108" fill="#1c1510"/>
  <!-- Pentagrama decorativo sutil -->
  <line x1="60" y1="180" x2="452" y2="180" stroke="#c9a84c" stroke-width="6" opacity="0.18"/>
  <line x1="60" y1="210" x2="452" y2="210" stroke="#c9a84c" stroke-width="6" opacity="0.18"/>
  <line x1="60" y1="240" x2="452" y2="240" stroke="#c9a84c" stroke-width="6" opacity="0.18"/>
  <line x1="60" y1="270" x2="452" y2="270" stroke="#c9a84c" stroke-width="6" opacity="0.18"/>
  <line x1="60" y1="300" x2="452" y2="300" stroke="#c9a84c" stroke-width="6" opacity="0.18"/>
  <!-- R centrada, Playfair-style bold serif -->
  <text
    x="256" y="360"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="300"
    font-weight="700"
    fill="#c9a84c"
    letter-spacing="-4"
  >R</text>
</svg>
